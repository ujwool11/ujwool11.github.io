<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Check 27: Content Security Policy, scoped to what this page actually needs
       (no Razorpay/jsdelivr here — admin.html only talks to Firebase + Google Fonts) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UJ Wool — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #FBF5F3;
      --surface:  #FFDDD1;
      --card:     #ffffff;
      --border:   #f0d0c8;
      --border2:  #e0c8c0;
      --primary:  #5E5185;
      --primary-d:#4a3d6e;
      --primary-g:linear-gradient(135deg,#5E5185,#7a5fa8);
      --accent:   #FFDDD1;
      --green:    #2e7d32;
      --amber:    #856404;
      --red:      #c62828;
      --blue:     #1565c0;
      --text:     #23170E;
      --muted:    #666666;
      --faint:    #aaaaaa;
      --sidebar-w:220px;
      --header-h: 58px;
      --radius:   12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── LOGIN SCREEN ─────────────────────────────── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      padding: 20px;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-brand {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .login-sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 32px;
    }
    .login-box {
      background: #fff;
      border: 1.5px solid #f0e3dd;
      border-radius: 18px;
      padding: 32px 28px;
      text-align: left;
    }
    .login-error {
      background: #fce4e4;
      border: 1px solid #ef9a9a;
      color: var(--red);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .login-error.show { display: block; }
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .field-input {
      width: 100%;
      padding: 10px 14px;
      background: #fff;
      border: 1.5px solid #e0d0d0;
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .field-input::placeholder { color: var(--faint); }
    .field-input:focus { border-color: var(--primary); }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary-g);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.3px;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── SHELL ────────────────────────────────────── */
    #shell { display: none; min-height: 100vh; }

    /* ─── TOPBAR ───────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px 0 0;
      z-index: 200;
      gap: 16px;
    }
    .topbar-logo {
      width: var(--sidebar-w);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
    }
    .topbar-logo .logo-icon {
      width: 30px; height: 30px;
      background: var(--primary-g);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .topbar-logo .logo-text { color: var(--text); }
    .topbar-logo .logo-text span { color: var(--primary); }

    .topbar-search {
      flex: 1;
      display: flex;
      align-items: center;
      background: #fff;
      border: 1.5px solid #e0d0d0;
      border-radius: 8px;
      padding: 0 12px;
      gap: 8px;
      max-width: 420px;
    }
    .topbar-search input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 8px 0;
    }
    .topbar-search input::placeholder { color: var(--faint); }
    .topbar-search svg { color: #aaa; flex-shrink: 0; }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-email {
      font-size: 12px;
      color: var(--muted);
    }
    .logout-btn {
      padding: 6px 14px;
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* ─── SIDEBAR ──────────────────────────────────── */
    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 12px;
      overflow-y: auto;
      z-index: 100;
    }
    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--faint);
      padding: 0 8px;
      margin: 16px 0 6px;
    }
    .sidebar-section-label:first-child { margin-top: 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: none;
      width: 100%;
      font-family: inherit;
      text-align: left;
    }
    .nav-item:hover { background: var(--card); color: var(--text); }
    .nav-item.active { background: #EDE9F8; color: var(--primary); font-weight: 600; }
    .nav-item svg { flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: var(--primary);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      min-width: 20px;
      text-align: center;
    }

    /* ─── MAIN CONTENT ─────────────────────────────── */
    .main {
      margin-left: var(--sidebar-w);
      margin-top: var(--header-h);
      padding: 24px;
      min-height: calc(100vh - var(--header-h));
    }

    /* ─── STATS ROW ────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.sc-total::before   { background: var(--primary); }
    .stat-card.sc-process::before { background: var(--amber); }
    .stat-card.sc-shipped::before { background: var(--blue); }
    .stat-card.sc-revenue::before { background: var(--green); }
    .stat-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .stat-card.sc-total   .stat-icon { background: #EDE9F8; }
    .stat-card.sc-process .stat-icon { background: #FFF3CD; }
    .stat-card.sc-shipped .stat-icon { background: #E3F2FD; }
    .stat-card.sc-revenue .stat-icon { background: #E8F5E9; }
    .stat-val   { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }

    /* ─── SECTION HEADER ───────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
    }
    .section-count {
      font-size: 12px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 3px 9px;
      border-radius: 12px;
    }
    .section-actions { margin-left: auto; display: flex; gap: 8px; }

    /* ─── FILTER CHIPS ─────────────────────────────── */
    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--card);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      color: var(--muted);
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--primary); color: var(--primary); }
    .chip.active { background: #EDE9F8; color: var(--primary); border-color: var(--primary); }

    /* ─── ACTION BUTTONS ───────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-ghost { background: var(--card); border-color: var(--border2); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
    .btn-primary { background: var(--primary-g); color: #fff; border: none; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-danger { background: #fce4e4; color: var(--red); border-color: #ef9a9a; }
    .btn-danger:hover { background: #f8c8c8; }
    .btn-success { background: #E8F5E9; color: var(--green); border-color: #a5d6a7; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ─── ORDER CARDS ──────────────────────────────── */
    .order-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .order-card:hover { border-color: var(--border2); }

    .order-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }
    .order-invoice {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }
    .order-date {
      font-size: 12px;
      color: var(--faint);
    }
    .order-head-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .status-badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      display: inline-block;
    }
    .badge-placed    { background: #EDE9F8; color: #5E5185; }
    .badge-placed::before { background: #5E5185; }
    .badge-packed    { background: #FFF3CD; color: #856404; }
    .badge-packed::before { background: #856404; }
    .badge-shipped   { background: #E3F2FD; color: #1565c0; }
    .badge-shipped::before { background: #1565c0; }
    .badge-delivered { background: #E8F5E9; color: #2E7D32; }
    .badge-delivered::before { background: #2E7D32; }

    .order-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .order-col {
      padding: 14px 16px;
    }
    .order-col:first-child {
      border-right: 1px solid var(--border);
    }
    .col-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--faint);
      margin-bottom: 8px;
    }
    .customer-name { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 4px; }
    .customer-detail {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 3px;
    }
    .customer-detail svg { flex-shrink: 0; margin-top: 1px; }

    .item-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
    }
    .item-row:last-child { border-bottom: none; }
    .item-row .item-name { color: var(--text); font-weight: 500; }

    .order-foot {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-wrap: wrap;
      gap: 10px;
    }
    .order-total { font-size: 15px; font-weight: 700; color: var(--text); }
    .order-utr { font-size: 11px; color: var(--faint); }

    .status-update-group {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .status-select {
      padding: 6px 10px;
      background: #fff;
      border: 1.5px solid #e0d0d0;
      border-radius: 7px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      min-width: 130px;
    }
    .status-select:focus { border-color: var(--primary); }
    .update-msg { font-size: 11px; font-weight: 600; }
    .update-msg.ok  { color: var(--green); }
    .update-msg.err { color: var(--red); }

    /* ─── REVIEW CARDS ─────────────────────────────── */
    .review-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
    }
    .review-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .review-reviewer { font-weight: 700; font-size: 14px; color: var(--text); }
    .review-meta { font-size: 11px; color: var(--faint); margin-top: 2px; }
    .stars { color: #FBC02D; font-size: 14px; letter-spacing: 1px; }
    .review-comment { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; font-style: italic; }
    .review-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .review-edit-area {
      width: 100%;
      background: #fff;
      border: 1.5px solid #e0d0d0;
      border-radius: 8px;
      padding: 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      outline: none;
      margin-bottom: 8px;
    }
    .review-edit-area:focus { border-color: var(--primary); }

    /* ─── LOADING / EMPTY ──────────────────────────── */
    .loading-wrap {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-wrap {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
    .empty-text { font-size: 14px; color: var(--muted); }

    /* ─── TAB PANELS ───────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ─── TOAST ────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #fff;
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      z-index: 999;
      display: none;
      align-items: center;
      gap: 10px;
      max-width: 300px;
    }
    #toast.show { display: flex; }
    #toast.t-ok   .toast-dot { background: #2e7d32; }
    #toast.t-err  .toast-dot { background: #c62828; }
    .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ─── RESPONSIVE ───────────────────────────────── */
    @media (max-width: 800px) {
      :root { --sidebar-w: 0px; }
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 16px; }
      .topbar-logo { width: auto; padding: 0 16px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .order-body { grid-template-columns: 1fr; }
      .order-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
    }
    @media (max-width: 500px) {
      .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-val { font-size: 20px; }
    }
  </style>
</head>
<body>

<!-- ══ TOAST ════════════════════════════════════════════════════ -->
<div id="toast"><span class="toast-dot"></span><span id="toastMsg"></span></div>

<!-- ══ LOGIN SCREEN ═════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-brand">🧶 UJ Wool</div>
    <div class="login-sub">Admin Control Panel</div>
    <div class="login-box">
      <div class="login-error" id="adminLoginError"></div>
      <label class="field-label">Email</label>
      <input class="field-input" type="email" id="adminEmail" placeholder="Admin email address" autocomplete="email">
      <label class="field-label">Password</label>
      <input class="field-input" type="password" id="adminPassword" placeholder="••••••••" autocomplete="current-password">
      <button class="login-btn" onclick="adminLogin()" id="adminLoginBtn">Sign in to Admin</button>
    </div>
  </div>
</div>

<!-- ══ SHELL ════════════════════════════════════════════════════ -->
<div id="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-logo">
      <div class="logo-icon">🧶</div>
      <div class="logo-text">UJ <span>Wool</span></div>
    </div>
    <div class="topbar-search">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search by name, phone, invoice…" oninput="onSearch()">
    </div>
    <div class="topbar-right">
      <span class="topbar-email" id="adminEmailDisplay"></span>
      <button class="logout-btn" onclick="adminLogout()">Sign out</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-section-label">Manage</div>
    <button class="nav-item active" id="nav-orders" onclick="switchTab('orders',this)">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
      Orders
      <span class="nav-badge" id="navBadgeOrders">—</span>
    </button>
    <button class="nav-item" id="nav-reviews" onclick="switchTab('reviews',this)">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Reviews
      <span class="nav-badge" id="navBadgeReviews">—</span>
    </button>

    <div class="sidebar-section-label">Filter by Status</div>
    <button class="nav-item" onclick="filterOrders('All',this);highlightFilter('All')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      All Orders
    </button>

/* ── Toast ─────────────────────────────────────────────────── */
var toastTimer;
function showToast(msg, type) {

// SECURITY FIX (Finding 3): admin.html had no HTML-escaping helper at
// all — every order/review field below was concatenated straight into
// innerHTML. Mirrors the escapeHtml() already used on the storefront
// (index-test.html) so customer- and reviewer-controlled text (names,
// addresses, comments, etc.) can never break out of the markup and run
// as script in this authenticated admin session.
function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

/* ── Auth state ─────────────────────────────────────────────── */

    document.getElementById('adminEmailDisplay').textContent = user.email;

/* ── Login ──────────────────────────────────────────────────── */
async function adminLogin() {
  var email    = document.getElementById('adminEmail').value.trim();
  var password = document.getElementById('adminPassword').value;
  var btn      = document.getElementById('adminLoginBtn');
  if (!email || !password) return showLoginError('Please enter email and password.');
  if (email !== ADMIN_EMAIL) return showLoginError('This email is not authorised.');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch(err) {
    var msg = 'Login failed.';
    if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') msg = 'Incorrect password.';
    if (err.code === 'auth/user-not-found') msg = 'No account for this email.';
    if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Please wait.';
    showLoginError(msg);
    btn.disabled = false; btn.textContent = 'Sign in to Admin';
  }
}
function showLoginError(msg) {
  var el = document.getElementById('adminLoginError');
  el.textContent = msg; el.classList.add('show');
}
document.addEventListener('DOMContentLoaded', function() {

/* ── State ──────────────────────────────────────────────────── */
var allOrders    = [];
var activeFilter = 'All';
var searchQuery  = '';

/* ── Load all orders ────────────────────────────────────────── */
async function loadAllOrders() {
  document.getElementById('adminLoading').style.display = 'block';
  document.getElementById('adminEmpty').style.display   = 'none';
  document.getElementById('adminOrders').style.display  = 'none';
  try {
    var snapshot = await db.collection('orders').get();
    allOrders = [];
    snapshot.forEach(function(doc) {
      allOrders.push(Object.assign({ _id: doc.id }, doc.data()));
    });
    allOrders.sort(function(a,b){
      var at = a.createdAt ? a.createdAt.seconds : 0;
      var bt = b.createdAt ? b.createdAt.seconds : 0;
      return bt - at;
    });
    updateStats();
    renderAdminOrders(activeFilter);
  } catch(err) {
    console.error(err);
    document.getElementById('adminLoading').style.display = 'none';
    document.getElementById('adminEmpty').querySelector('.empty-text').textContent = 'Error loading orders.';
    document.getElementById('adminEmpty').style.display   = 'block';
  }
}

/* ── Stats ──────────────────────────────────────────────────── */
function updateStats() {
  var total   = allOrders.length;
  var placed  = allOrders.filter(function(o){ return o.status === 'Placed' || o.status === 'Packed'; }).length;
  var shipped = allOrders.filter(function(o){ return o.status === 'Shipped'; }).length;
  var revenue = allOrders.reduce(function(s,o){ return s + (Number(o.grandTotal)||0); }, 0);
  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statPlaced').textContent  = placed;
  document.getElementById('statShipped').textContent = shipped;
  document.getElementById('statRevenue').textContent = '₹' + revenue.toLocaleString('en-IN');
  document.getElementById('navBadgeOrders').textContent = total;
}

/* ── Filter ─────────────────────────────────────────────────── */
function filterOrders(status, btn) {
  activeFilter = status;
  document.querySelectorAll('.chip[data-filter]').forEach(function(b){ b.classList.remove('active'); });
  var chip = document.querySelector('.chip[data-filter="' + status + '"]');
  if (chip) chip.classList.add('active');
  renderAdminOrders(status);
  // Ensure orders panel is active
  switchTabPanel('orders');
}
function highlightFilter(status) {}

/* ── Search ─────────────────────────────────────────────────── */
function onSearch() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  renderAdminOrders(activeFilter);
}

/* ── Render orders ──────────────────────────────────────────── */
function renderAdminOrders(filter) {
  var list = document.getElementById('adminOrders');
  list.innerHTML = '';
  var filtered = filter === 'All'
    ? allOrders
    : allOrders.filter(function(o){ return (o.status || 'Placed') === filter; });

  if (searchQuery) {
    filtered = filtered.filter(function(o) {
      var c = o.customer || {};
      var inv = o.invoiceNumber ? '#' + o.invoiceNumber : o._id.slice(-8).toUpperCase();
      return (c.name||'').toLowerCase().includes(searchQuery)
          || (c.phone||'').toLowerCase().includes(searchQuery)
          || inv.toLowerCase().includes(searchQuery)
          || (c.email||'').toLowerCase().includes(searchQuery);
    });
  }

  document.getElementById('adminLoading').style.display = 'none';
  document.getElementById('ordersCount').textContent    = filtered.length + ' orders';

  if (filtered.length === 0) {
    document.getElementById('adminEmpty').querySelector('.empty-text').textContent =
      searchQuery ? 'No orders matching "' + searchQuery + '".'
      : (filter === 'All' ? 'No orders yet.' : 'No ' + filter + ' orders.');
    document.getElementById('adminEmpty').style.display  = 'block';
    document.getElementById('adminOrders').style.display = 'none';
    return;
  }
  document.getElementById('adminEmpty').style.display  = 'none';
  document.getElementById('adminOrders').style.display = 'block';
  filtered.forEach(function(order){ list.appendChild(buildAdminCard(order)); });
}

/* ── Build card ─────────────────────────────────────────────── */
function buildAdminCard(order) {
  var card = document.createElement('div');
  card.className = 'order-card';
  card.id        = 'card-' + order._id;

  var dateStr = '—';
  if (order.createdAt && order.createdAt.seconds) {
    dateStr = new Date(order.createdAt.seconds * 1000)
      .toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  var status     = order.status || 'Placed';
  var badgeClass = 'badge-' + status.toLowerCase();
  var invoiceLbl = order.invoiceNumber ? '#' + order.invoiceNumber : order._id.slice(-8).toUpperCase();
  var customer   = order.customer || {};

  // SECURITY FIX (Finding 3): every customer/order field below is
  // wrapped in escapeHtml() — these are values a customer typed at
  // checkout (address in particular has no character filtering
  // server-side beyond a length check) and would otherwise execute in
  // this admin session, with full admin Firestore access, the moment
  // this card renders.
  var itemsHTML = '';
  if (order.items && order.items.length) {
    order.items.forEach(function(item) {
      var lt = (Number(item.price) * Number(item.qty)) || Number(item.total) || 0;
      itemsHTML += '<div class="item-row"><span class="item-name">' + escapeHtml(item.name||'Item') + ' × ' + (item.qty||1) + '</span><span>₹' + lt.toLocaleString('en-IN') + '</span></div>';
    });
  } else {
    itemsHTML = '<div class="item-row" style="color:var(--faint)">Items not recorded</div>';
  }

  var statusOptions = ['Placed','Packed','Shipped','Delivered'].map(function(s){
    return '<option value="' + s + '"' + (s===status?' selected':'') + '>' + s + '</option>';
  }).join('');

  card.innerHTML =
    '<div class="order-head">' +
      '<div>' +
        '<div class="order-invoice">Invoice ' + invoiceLbl + '</div>' +
        '<div class="order-date">' + dateStr + '</div>' +
      '</div>' +
      '<div class="order-head-right">' +
        '<span class="status-badge ' + badgeClass + '">' + status + '</span>' +
      '</div>' +
    '</div>' +

    '<div class="order-body">' +
      '<div class="order-col">' +
        '<div class="col-label">Customer</div>' +
        '<div class="customer-name">' + escapeHtml(customer.name || '—') + '</div>' +
        '<div class="customer-detail"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.86 12 19.79 19.79 0 0 1 1.81 3.4a2 2 0 0 1 2-2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.88-.87a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>' + escapeHtml(customer.phone || '—') + '</div>' +
        '<div class="customer-detail"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>' + escapeHtml(customer.email || '—') + '</div>' +
        '<div class="customer-detail"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + escapeHtml(customer.address || '—') + (customer.pincode ? ' – ' + escapeHtml(String(customer.pincode)) : '') + '</div>' +
      '</div>' +
      '<div class="order-col">' +
        '<div class="col-label">Items</div>' +
        itemsHTML +
      '</div>' +
    '</div>' +

    '<div class="order-foot">' +
      '<div>' +
        '<div class="order-total">₹' + (Number(order.grandTotal)||0).toLocaleString('en-IN') + '</div>' +
        '<div class="order-utr">UTR: ' + escapeHtml(order.paymentRef || '—') + '</div>' +
      '</div>' +
      '<div class="status-update-group">' +
        '<select class="status-select" id="sel-' + order._id + '">' + statusOptions + '</select>' +
        '<button class="btn btn-primary" onclick="updateOrderStatus(\'' + order._id + '\')" id="updbtn-' + order._id + '">Save Status</button>' +
        '<span class="update-msg" id="updmsg-' + order._id + '"></span>' +
        '<button class="btn btn-danger" onclick="deleteOrder(\'' + order._id + '\',\'' + invoiceLbl + '\')">Delete</button>' +
      '</div>' +
    '</div>';

  return card;
}

/* ── Update status ──────────────────────────────────────────── */
async function updateOrderStatus(orderId) {
  var sel    = document.getElementById('sel-'    + orderId);
  var btn    = document.getElementById('updbtn-' + orderId);
  var msgEl  = document.getElementById('updmsg-' + orderId);
  var newStatus = sel.value;
  btn.disabled = true; btn.textContent = 'Saving…';
  msgEl.textContent = '';
  try {
    await db.collection('orders').doc(orderId).update({ status: newStatus });
    var order = allOrders.find(function(o){ return o._id === orderId; });
    if (order) order.status = newStatus;
    var card = document.getElementById('card-' + orderId);
    if (card) {
      var badge = card.querySelector('.status-badge');
      if (badge) { badge.textContent = newStatus; badge.className = 'status-badge badge-' + newStatus.toLowerCase(); }
    }
    updateStats();
    showToast('Order updated to ' + newStatus, 'ok');
    msgEl.textContent = '✓ Saved'; msgEl.className = 'update-msg ok';
    setTimeout(function(){ msgEl.textContent = ''; }, 3000);
  } catch(err) {
    console.error(err);
    showToast('Update failed', 'err');
    msgEl.textContent = 'Failed'; msgEl.className = 'update-msg err';
  } finally {
    btn.disabled = false; btn.textContent = 'Save Status';
  }
}

/* ── Delete order ───────────────────────────────────────────── */
async function deleteOrder(orderId, label) {
  if (!confirm('Delete order ' + label + '?\n\nThis cannot be undone.')) return;
  try {
    await db.collection('orders').doc(orderId).delete();
    allOrders = allOrders.filter(function(o){ return o._id !== orderId; });
    var card = document.getElementById('card-' + orderId);
    if (card) card.remove();
    updateStats();
    showToast('Order ' + label + ' deleted', 'ok');
    renderAdminOrders(activeFilter);
  } catch(err) {
    console.error(err);
    showToast('Could not delete order', 'err');
  }
}

/* ── Tab switching ──────────────────────────────────────────── */
function switchTabPanel(tab) {
  document.getElementById('ordersPanel').classList.toggle('active', tab === 'orders');
  document.getElementById('reviewsPanel').classList.toggle('active', tab === 'reviews');
}
function switchTab(tab, btn) {
  switchTabPanel(tab);
  document.querySelectorAll('.nav-item').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('nav-' + tab).classList.add('active');

}

/* ── Reviews ────────────────────────────────────────────────── */
var allReviewsAdmin = [];
async function loadAllReviewsAdmin() {
  document.getElementById('reviewsAdminLoading').style.display = 'block';
  document.getElementById('reviewsAdminEmpty').style.display   = 'none';
  document.getElementById('reviewsAdminList').style.display    = 'none';
  try {
    var snap = await db.collection('reviews').get();
    allReviewsAdmin = [];
    snap.forEach(function(doc){ allReviewsAdmin.push(Object.assign({ _id: doc.id }, doc.data())); });
    allReviewsAdmin.sort(function(a,b){
      var at = a.createdAt ? a.createdAt.seconds : 0;
      var bt = b.createdAt ? b.createdAt.seconds : 0;
      return bt - at;
    });
    renderReviewsAdmin();
  } catch(err) {
    console.error(err);
    document.getElementById('reviewsAdminLoading').innerHTML = '<div style="color:var(--red);font-weight:700;">Error loading reviews.</div>';
  }
}

function renderReviewsAdmin() {
  var list = document.getElementById('reviewsAdminList');
  list.innerHTML = '';
  document.getElementById('reviewsAdminLoading').style.display = 'none';
  document.getElementById('navBadgeReviews').textContent = allReviewsAdmin.length;
  document.getElementById('reviewsCount').textContent    = allReviewsAdmin.length + ' reviews';

  if (allReviewsAdmin.length === 0) {
    document.getElementById('reviewsAdminEmpty').style.display = 'block';
    return;
  }
  document.getElementById('reviewsAdminList').style.display = 'block';

  allReviewsAdmin.forEach(function(r) {
    var stars = '';
    for (var s=1;s<=5;s++) stars += s<=r.rating?'★':'☆';
    var dateStr = r.createdAt && r.createdAt.seconds
      ? new Date(r.createdAt.seconds*1000).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})
      : '—';

    var div = document.createElement('div');
    div.className = 'review-card';
    div.id = 'review-card-' + r._id;
    // SECURITY FIX (Finding 3): userName, productId and comment are all
    // reviewer-controlled — escapeHtml() them the same way index-test.html
    // already escapes review text on the storefront. The textarea keeps
    // working exactly as before: browsers HTML-decode a textarea's text
    // content back into its real .value, so escaping the initial markup
    // here doesn't change what the admin sees or edits, it only stops an
    // unescaped comment from breaking out of the </textarea> boundary.
    div.innerHTML =
      '<div class="review-top">' +
        '<div>' +
          '<div class="review-reviewer">' + escapeHtml(r.userName||'Customer') + '</div>' +
          '<div class="review-meta">' + escapeHtml(r.productId||'Product') + ' · ' + dateStr + '</div>' +
        '</div>' +
        '<div class="stars">' + stars + '</div>' +
      '</div>' +
      '<div class="review-comment" id="review-comment-' + r._id + '">' + (r.comment ? escapeHtml(r.comment) : '<i style="opacity:0.4">No comment</i>') + '</div>' +
      '<div id="review-edit-area-' + r._id + '" style="display:none;">' +
        '<textarea class="review-edit-area" id="review-ta-' + r._id + '">' + escapeHtml(r.comment||'') + '</textarea>' +
        '<div style="display:flex;gap:6px;">' +
          '<button class="btn btn-primary" onclick="saveReviewEdit(\'' + r._id + '\')">Save</button>' +
          '<button class="btn btn-ghost" onclick="cancelReviewEdit(\'' + r._id + '\')">Cancel</button>' +
        '</div>' +
      '</div>' +
      '<div class="review-actions">' +
        '<button class="btn btn-ghost" onclick="startReviewEdit(\'' + r._id + '\')">Edit</button>' +
        '<button class="btn btn-danger" onclick="deleteReview(\'' + r._id + '\')">Delete</button>' +
      '</div>';
    list.appendChild(div);
  });
}

function startReviewEdit(reviewId) {
  document.getElementById('review-comment-' + reviewId).style.display   = 'none';
  document.getElementById('review-edit-area-' + reviewId).style.display = 'block';
}
function cancelReviewEdit(reviewId) {
  document.getElementById('review-comment-' + reviewId).style.display   = 'block';
  document.getElementById('review-edit-area-' + reviewId).style.display = 'none';
}
async function saveReviewEdit(reviewId) {
  var ta = document.getElementById('review-ta-' + reviewId);
  var newComment = ta ? ta.value.trim() : '';
  try {
    await db.collection('reviews').doc(reviewId).update({ comment: newComment });
    // SECURITY FIX (Finding 3): escape before writing back into innerHTML —
    // without this, saving an edit (even an unchanged one) would
    // re-introduce the exact same injection this fix removes elsewhere.
    document.getElementById('review-comment-' + reviewId).innerHTML = newComment ? escapeHtml(newComment) : '<i style="opacity:0.4">No comment</i>';
    cancelReviewEdit(reviewId);
    showToast('Review updated', 'ok');
  } catch(err) {
    showToast('Could not update review', 'err');
  }
}
async function deleteReview(reviewId) {
  if (!confirm('Delete this review? This cannot be undone.')) return;
  try {
    await db.collection('reviews').doc(reviewId).delete();
    allReviewsAdmin = allReviewsAdmin.filter(function(r){ return r._id !== reviewId; });
    var card = document.getElementById('review-card-' + reviewId);
    if (card) card.remove();
    if (allReviewsAdmin.length === 0) {
      document.getElementById('reviewsAdminEmpty').style.display = 'block';
      document.getElementById('reviewsAdminList').style.display  = 'none';
    }
    document.getElementById('navBadgeReviews').textContent = allReviewsAdmin.length;
    showToast('Review deleted', 'ok');
  } catch(err) {
    showToast('Could not delete review', 'err');
  }
}
</script>
